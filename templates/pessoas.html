{% extends "base.html" %}{% block content %}<div class="row"><div class="col-md-7"><h2>Pessoas</h2><form class="mb-3"><input class="form-control" name="busca" value="{{busca}}" placeholder="Buscar por nome ou CPF"></form><table class="table bg-white"><tr><th>Nome</th><th>CPF</th><th></th></tr>{% for p in pessoas %}<tr><td>{{p.nome}}</td><td>{{p.cpf or ''}}</td><td><a class="btn btn-sm btn-primary" href="/pessoa/{{p.id}}">Abrir</a></td></tr>{% else %}<tr><td colspan="3">Nenhuma pessoa encontrada.</td></tr>{% endfor %}</table></div><div class="col-md-5"><div class="card"><div class="card-body"><h4>Nova pessoa</h4><form method="post"><input class="form-control mb-2" name="nome" placeholder="Nome completo" required><input class="form-control mb-2" name="cpf" placeholder="CPF"><label>Data de nascimento</label><input class="form-control mb-2" type="date" name="nascimento"><input class="form-control mb-2" name="telefone" placeholder="Telefone"><textarea class="form-control mb-2" name="endereco" placeholder="Endereço"></textarea><button class="btn btn-success">Cadastrar</button></form></div></div></div></div>{% endblock %}
